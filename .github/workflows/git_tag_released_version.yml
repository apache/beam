# This workflow will generate the released version tag and push it to the repository

# To learn more about GitHub Actions in Apache Beam check the CI.md

name: Git Tag Released Version
on:
  workflow_dispatch:
    inputs:
      VERSION_TAG:
        description: Beam Final Version Tag
        required: true
      RC_TAG:
        description: Beam RC Tag
        required: true

jobs:
  generate_tags:
    runs-on: ubuntu-latest
    env:
      VERSION_PATH: ${{ github.event.inputs.VERSION_TAG }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set git config
        run: |
          git config user.name $GITHUB_ACTOR
          git config user.email actions@"$RUNNER_NAME".local
      - name: Tag for Go SDK
        run: |
          git tag -a sdks/${GITHUB_EVENT_INPUTS_VERSION_TAG} -m ${GITHUB_EVENT_INPUTS_RC_TAG}
          git push https://github.com/apache/beam sdks/${GITHUB_EVENT_INPUTS_VERSION_TAG}
        env:
          GITHUB_EVENT_INPUTS_VERSION_TAG: ${{ github.event.inputs.VERSION_TAG }}
          GITHUB_EVENT_INPUTS_RC_TAG: ${{ github.event.inputs.RC_TAG }}
      - name: Tag for repo root
        run: |
          git tag -a ${GITHUB_EVENT_INPUTS_VERSION_TAG} -m ${GITHUB_EVENT_INPUTS_RC_TAG}
          git push https://github.com/apache/beam ${GITHUB_EVENT_INPUTS_VERSION_TAG}
        env:
          GITHUB_EVENT_INPUTS_VERSION_TAG: ${{ github.event.inputs.VERSION_TAG }}
          GITHUB_EVENT_INPUTS_RC_TAG: ${{ github.event.inputs.RC_TAG }}


