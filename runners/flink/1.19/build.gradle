project.ext {
  flink_major = '1.19'
  flink_version = '1.19.0'
}

// Load the main build script which contains all build logic.
apply from: "../flink_runner.gradle"

// Flink 1.19 uses org.lz4:lz4-java instead of at.yawk.lz4:lz4-java
// Explicitly prefer at.yawk.lz4 candidates to resolve capability conflict
configurations.all {
  resolveCapabilitiesConflict(it, 'org.lz4:lz4-java', 'at.yawk.lz4')
}
