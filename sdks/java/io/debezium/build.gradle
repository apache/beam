import groovy.json.JsonOutput

plugins { id 'org.apache.beam.module' }
applyJavaNature(
        automaticModuleName: 'org.apache.beam.sdk.io.debezium',
        mavenRepositories: [
                [id: 'io.confluent', url: 'https://packages.confluent.io/maven/']
        ],
        enableSpotbugs: false,
)
provideIntegrationTestingDependencies()

description = "Apache Beam :: SDKs :: Java :: IO :: Debezium"
ext.summary = "Library to work with Debezium data."

dependencies {
    implementation library.java.vendored_guava_32_1_2_jre
    implementation library.java.vendored_grpc_1_69_0
    implementation project(path: ":sdks:java:core", configuration: "shadow")
    implementation library.java.slf4j_api
    implementation library.java.joda_time
    provided library.java.jackson_dataformat_csv
    permitUnusedDeclared library.java.jackson_dataformat_csv
    testImplementation project(path: ":sdks:java:core", configuration: "shadowTest")
    testImplementation project(path: ":sdks:java:io:common")

    // Test dependencies
    testImplementation library.java.junit
    testImplementation project(path: ":sdks:java:io:jdbc")
    testRuntimeOnly library.java.slf4j_jdk14
    testRuntimeOnly project(path: ":runners:direct-java", configuration: "shadow")
    testImplementation project(":runners:google-cloud-dataflow-java")
    testImplementation library.java.hamcrest
    testImplementation library.java.testcontainers_base
    testImplementation library.java.testcontainers_mysql
    testImplementation library.java.testcontainers_postgresql
    // TODO(https://github.com/apache/beam/issues/31678) HikariCP 5.x requires Java11+
    testImplementation 'com.zaxxer:HikariCP:4.0.3'

    // Kafka connect dependencies
    implementation "org.apache.kafka:connect-api:2.5.0"
    implementation "org.apache.kafka:connect-json:2.5.0"
    permitUnusedDeclared "org.apache.kafka:connect-json:2.5.0" // BEAM-11761

    // Debezium dependencies
    implementation group: 'io.debezium', name: 'debezium-core', version: '3.1.1.Final'
    testImplementation group: 'io.debezium', name: 'debezium-connector-mysql', version: '3.1.1.Final'
    testImplementation group: 'io.debezium', name: 'debezium-connector-postgres', version: '3.1.1.Final'
}

test {
    testLogging {
        outputs.upToDateWhen {false}
        showStandardStreams = true
    }
}

sourceCompatibility = JavaVersion.VERSION_17
targetCompatibility = JavaVersion.VERSION_17

tasks.withType(JavaCompile).configureEach { JavaCompile task ->
    if (task.project == project && (task.name == 'compileJava' || task.name == 'compileTestJava')) {
        logger.lifecycle("[BUILD_GRADLE] Debezium IO: Attempting to configure ${task.path} for Java 17.")
        String jdk17HomePath = project.findProperty("java17Home")?.toString()?.trim()

        if (jdk17HomePath != null && !jdk17HomePath.isEmpty() && project.file(jdk17HomePath).isDirectory()) {
            logger.lifecycle("[BUILD_GRADLE] Debezium IO: Using java17Home='${jdk17HomePath}' for ${task.path}.")
            task.options.fork = true
            task.options.forkOptions.javaHome = project.file(jdk17HomePath)

            // Initial compiler args (will be further modified by ErrorProne plugin, then we clean up)
            List<String> baseCompilerArgs = []
            task.options.compilerArgs.each { arg -> // Keep existing Beam defaults if they don't conflict
                if (arg.startsWith('-Xlint') || arg == '-parameters' || arg == '-Werror' || arg.startsWith("-XD")) {
                    baseCompilerArgs.add(arg.toString())
                }
            }
            baseCompilerArgs.add('--release')
            baseCompilerArgs.add('17')
            task.options.compilerArgs = baseCompilerArgs // Set our base Java 17 args

            // Configure JVM args for ErrorProne (for the forked JVM)
            if (project.plugins.hasPlugin('net.ltgt.errorprone')) {
                def errorProneAddModuleOptsForJava17 = [
                    "--add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED",
                    "--add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED",
                    "--add-exports=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED",
                    "--add-exports=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED",
                    "--add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED",
                    "--add-exports=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED",
                    "--add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED",
                    "--add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED",
                    "--add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED",
                    "--add-opens=jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED"
                ]
                List<String> currentJvmArgs = task.options.forkOptions.getJvmArgs() ?: []
                errorProneAddModuleOptsForJava17.collect { '-J' + it }.each { argToAdd ->
                    if (!currentJvmArgs.contains(argToAdd)) { currentJvmArgs.add(argToAdd) }
                }
                task.options.forkOptions.setJvmArgs(currentJvmArgs)
                logger.lifecycle("[BUILD_GRADLE] Debezium IO: ${task.path} - Updated forkOptions.jvmArgs for ErrorProne: ${task.options.forkOptions.jvmArgs.join(' ')}")
            }

            // After everything (including ErrorProne plugin) has configured the task,
            // ensure --add-exports are not in compilerArgs for --release.
            // This needs to happen late in the configuration.
            task.doFirst { // Or use project.afterEvaluate if doFirst is too late for some checks
                List<String> finalArgs = []
                boolean skipNext = false
                for (String arg : task.options.compilerArgs) {
                    if (skipNext) {
                        skipNext = false
                        continue
                    }
                    if (arg.startsWith("--add-exports=") || arg.startsWith("--add-opens=")) {
                        // Skip these if they are direct compiler args
                        logger.lifecycle("[BUILD_GRADLE] Debezium IO: ${task.path} - Removing direct ${arg} from compilerArgs due to --release.")
                        continue
                    }
                    // Also handle cases where --add-exports might be two arguments
                    if (arg == "--add-exports" || arg == "--add-opens") {
                        logger.lifecycle("[BUILD_GRADLE] Debezium IO: ${task.path} - Removing split ${arg} and its value from compilerArgs due to --release.")
                        skipNext = true
                        continue
                    }
                    finalArgs.add(arg)
                }
                // Ensure --release 17 is still there and correctly placed if it was removed.
                if (!finalArgs.contains('--release')) {
                    finalArgs.add('--release')
                    finalArgs.add('17')
                } else {
                    int releaseIdx = finalArgs.indexOf('--release')
                    if (releaseIdx + 1 >= finalArgs.size() || finalArgs.get(releaseIdx + 1) != '17') {
                        if (releaseIdx + 1 < finalArgs.size()) finalArgs.removeAt(releaseIdx + 1) // remove wrong value
                        finalArgs.removeAt(releaseIdx) // remove --release
                        finalArgs.add('--release')
                        finalArgs.add('17')
                    }
                }
                task.options.compilerArgs = finalArgs
                logger.lifecycle("[BUILD_GRADLE] Debezium IO: ${task.path} - Final compilerArgs before execution: ${task.options.compilerArgs.join(' ')}")
                    
            } else {
                 logger.warn("[BUILD_GRADLE] Debezium IO: ${task.path} - ErrorProne plugin not detected. Skipping ErrorProne JVM args specific setup.")
            }
        } else {
            logger.warn("[BUILD_GRADLE] Debezium IO: Project property 'java17Home' not found, empty, " +
                "or not a valid directory. Value: '${jdk17HomePath ?: 'null'}'. " +
                "${task.path} will attempt to use default JDK with --release 17.")
            List<String> existingArgs = task.options.compilerArgs.collect { it.toString() }
            List<String> finalCompilerArgs = []
            existingArgs.each { arg ->
                if (arg.startsWith('-Xlint') || arg == '-parameters' || arg == '-Werror' || arg.startsWith("-XD")) {
                    finalCompilerArgs.add(arg)
                }
            }
            finalCompilerArgs.add('--release')
            finalCompilerArgs.add('17')
            task.options.compilerArgs = finalCompilerArgs
        }
    }
}

// Configure Javadoc task to also use JDK 17
tasks.named('javadoc', Javadoc) {
    logger.lifecycle("[BUILD_GRADLE] Debezium IO: Attempting to configure javadoc task for Java 17.")
    dependsOn(tasks.named('classes'))

    classpath = sourceSets.main.allJava.sourceDirectories + sourceSets.main.compileClasspath + sourceSets.main.output

    String jdk17HomePath = project.findProperty("java17Home")?.toString()?.trim()
    if (jdk17HomePath != null && !jdk17HomePath.isEmpty() && project.file(jdk17HomePath).isDirectory()) {
        logger.lifecycle("[BUILD_GRADLE] Debezium IO: Using java17Home='${jdk17HomePath}' for javadoc executable.")
        executable = project.file("${jdk17HomePath}/bin/javadoc").absolutePath
    } else {
        logger.warn("[BUILD_GRADLE] Debezium IO: 'java17Home' not found for javadoc task. Using default javadoc tool.")
    }
}

task integrationTest(type: Test, dependsOn: processTestResources) {
  group = "Verification"
  systemProperty "beamTestPipelineOptions", JsonOutput.toJson([
          "--runner=DirectRunner",
  ])

  // Disable Gradle cache: these ITs interact with live service that should always be considered "out of date"
  outputs.upToDateWhen { false }

  include '**/*IT.class'
  classpath = sourceSets.test.runtimeClasspath
  testClassesDirs = sourceSets.test.output.classesDirs

  useJUnit {
  }
}
