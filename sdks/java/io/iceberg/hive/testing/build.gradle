plugins { id 'org.apache.beam.module' }
applyJavaNature(
        automaticModuleName: 'org.apache.beam.sdk.io.iceberg.hive.testing',
        exportJavadoc: false,
        publish: false, // internal utils used by Iceberg integration and load tests
)

description = "Apache Beam :: SDKs :: Java :: IO :: Iceberg :: Hive :: Testing"
ext.summary = "Test utilities for setting up a local Hive metastore."

def hive_version = "3.1.3"
def iceberg_version = "1.6.1"

dependencies {
    implementation library.java.vendored_guava_32_1_2_jre
    implementation project(path: ":sdks:java:io:iceberg:hive")
    implementation library.java.hadoop_common
    implementation "org.apache.iceberg:iceberg-common:$iceberg_version"
    implementation "org.apache.iceberg:iceberg-core:$iceberg_version"
    implementation ("org.apache.iceberg:iceberg-hive-metastore:$iceberg_version")
    implementation ("org.apache.hive:hive-metastore:$hive_version")
    implementation "org.assertj:assertj-core:3.11.1"
    runtimeOnly ("org.apache.hive.hcatalog:hive-hcatalog-core:$hive_version") {
        exclude group: "org.apache.hive", module: "hive-exec"
        exclude group: "org.apache.parquet", module: "parquet-hadoop-bundle"
    }
}
