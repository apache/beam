fixtures:
  - name: ICEBERG_FIXTURE
    type: "apache_beam.yaml.integration_tests.temp_iceberg_table_with_pk"
    config:
      table_data:
        name: "labels"
        schema:
          type: "struct"
          schema-id: 0
          fields:
            - { id: 1, name: "label", required: true, type: "string" }
            - { id: 2, name: "rank", required: true, type: "long" }
          identifier-field-ids: [1]

pipelines:
  - name: write
    pipeline:
      type: chain
      transforms:
        - type: Create
          config:
            elements:
              - {label: "11a", rank: 0}
              - {label: "37a", rank: 1}
              - {label: "389a", rank: 2}
        - type: WriteToIceberg
          config:
            table: "{ICEBERG_FIXTURE[table]}"
            catalog_name: rest_catalog
            catalog_properties:
              type: rest
              uri: "{ICEBERG_FIXTURE[api_url]}"
    options:
      project: "apache-beam-testing"
      temp_location: "{ICEBERG_FIXTURE[temp_dir]}"

  - name: read
    pipeline:
      type: chain
      transforms:
        - type: ReadFromIceberg
          config:
            table: "{ICEBERG_FIXTURE[table]}"
            catalog_name: rest_catalog
            catalog_properties:
              type: rest
              uri: "{ICEBERG_FIXTURE[api_url]}"
        - type: AssertEqual
          config:
            elements:
              - {label: "11a", rank: 0}
              - {label: "37a", rank: 1}
              - {label: "389a", rank: 2}
    options:
      project: "apache-beam-testing"
      temp_location: "{ICEBERG_FIXTURE[temp_dir]}"

  - name: read_cdc_batch
    pipeline:
      type: chain
      transforms:
        - type: ReadFromIcebergCDC
          config:
            table: "{ICEBERG_FIXTURE[table]}"
            catalog_name: rest_catalog
            catalog_properties:
              type: rest
              uri: "{ICEBERG_FIXTURE[api_url]}"
            from_timestamp: 1762819200000
            to_timestamp:  2078352000000
            filter: '"label" = ''11a'' or "rank" = 1'
            keep:
              - label
              - rank
        - type: AssertEqual
          config:
            elements:
              - {label: "11a", rank: 0}
              - {label: "37a", rank: 1}
    options:
      project: "apache-beam-testing"
      temp_location: "{ICEBERG_FIXTURE[temp_dir]}"

  - name: read_cdc_streaming
    pipeline:
      type: chain
      transforms:
        - type: ReadFromIcebergCDC
          config:
            table: "{ICEBERG_FIXTURE[table]}"
            catalog_name: rest_catalog
            catalog_properties:
              type: rest
              uri: "{ICEBERG_FIXTURE[api_url]}"
            streaming: True
            to_timestamp: 2078352000000
            filter: '"label" = ''11a'' or "rank" = 1'
            keep:
              - label
              - rank
        - type: AssertEqual
          config:
            elements:
              - {label: "11a", rank: 0}
              - {label: "37a", rank: 1}
    options:
      project: "apache-beam-testing"
      temp_location: "{ICEBERG_FIXTURE[temp_dir]}"
