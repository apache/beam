fixtures:
  - name: mock_pipeline
    type: unittest.mock.patch
    config:
      target: transformers.pipeline

pipelines:
  - pipeline:
      type: chain
      transforms:
        - type: Create
          config:
            elements:
              - text: "Hello world"
              - text: "Bye world"
        - type: RunInference
          config:
            model_handler:
              type: "HuggingFacePipeline"
              config:
                task: "text-classification"
                model: "unused"
                inference_fn:
                  callable: |
                    def mock_inference(batch, pipeline, inference_args):
                      return [[dict(label='POSITIVE', score=0.9)] for _ in batch]
                preprocess:
                  callable: 'lambda x: x.text'
        - type: MapToFields
          config:
            language: python
            fields:
              text: text
              inference:
                callable: |
                  def get_json(x):
                    import json
                    return json.dumps(x.inference.inference, indent=0).strip()
        - type: AssertEqual
          config:
            elements:
              - text: "Hello world"
                inference: "[\n{\n\"label\": \"POSITIVE\",\n\"score\": 0.9\n}\n]"
              - text: "Bye world"
                inference: "[\n{\n\"label\": \"POSITIVE\",\n\"score\": 0.9\n}\n]"
    options:
      yaml_experimental_features: ['ML']
