fixtures:
  - name: mongo_vars
    type: "apache_beam.yaml.integration_tests.temp_mongodb_table"

pipelines:
  - pipeline:
      type: composite
      transforms:
        - type: Create
          name: CreateData
          config:
            elements:
              - { name: "John", age: 30 }
              - { name: "Jane", age: 25 }
        - type: WriteToMongoDB
          name: WriteData
          input: CreateData
          config:
            uri: '{mongo_vars[URI]}'
            database: '{mongo_vars[DATABASE]}'
            collection: '{mongo_vars[COLLECTION]}'
            error_handling:
              output: my_error_output
        - type: AssertEqual
          input: WriteData.my_error_output
          config:
            elements: []
  - pipeline:
     type: composite
     transforms:
       - type: ReadFromMongoDB
         name: ReadData
         config:
           uri: '{mongo_vars[URI]}'
           database: '{mongo_vars[DATABASE]}'
           collection: '{mongo_vars[COLLECTION]}'
           schema: |
             {
               "type": "object",
               "properties": {
                 "name": {"type": "string"},
                 "age": {"type": "integer"}
               },
               "required": ["name", "age"]
             }
           error_handling:
             output: my_error_output
       - type: AssertEqual
         input: ReadData
         config:
           elements:
             - { name: "John", age: 30 }
             - { name: "Jane", age: 25 }
       - type: AssertEqual
         input: ReadData.my_error_output
         config:
           elements: []


