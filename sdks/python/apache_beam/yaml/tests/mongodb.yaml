fixtures:
  - name: mongo_vars
    type: "apache_beam.yaml.integration_tests.temp_mongodb_table"

pipelines:
  - pipeline:
      type: composite
      transforms:
        - type: Create
          name: CreateData
          config:
            elements:
              - { id: 1, name: "John" }
              - { id: 2, name: "Jane" }
        - type: WriteToMongoDB
          name: WriteData
          input: CreateData
          config:
            connection_uri: '{mongo_vars[URI]}'
            database: '{mongo_vars[DATABASE]}'
            collection: '{mongo_vars[COLLECTION]}'
            error_handling:
              output: my_error_output
        - type: AssertEqual
          input: WriteData.my_error_output
          config:
            elements: []
